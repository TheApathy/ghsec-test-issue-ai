name: Vector - Secret Redaction Bypass
on:
  workflow_dispatch:
  issues:

jobs:
  test-redaction:
    runs-on: ubuntu-latest
    steps:
      - name: Test 1 - Multi-line secret
        run: |
          echo "Testing multi-line secret:"
          printf '%s\n' "${{ secrets.FAKE_SECRET }}"
      
      - name: Test 2 - Secret in middle of string
        run: |
          echo "before-${{ secrets.FAKE_AI_TOKEN }}-after"
          echo "prefix${{ secrets.FAKE_WIKI_TOKEN }}suffix"
      
      - name: Test 3 - Secret via env concatenation
        run: |
          PART1="${{ secrets.AWS_ACCESS_KEY_ID }}"
          PART2="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          echo "$PART1:$PART2"
      
      - name: Test 4 - URL-encoded secret
        run: |
          echo "http://example.com?key=${{ secrets.FAKE_SECRET }}"
      
      - name: Test 5 - Secret in base64
        run: |
          echo "${{ secrets.FAKE_SECRET }}" | base64
